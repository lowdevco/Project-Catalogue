<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/password.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Password Generator</title>
</head>
<body class="flex items-center justify-center h-screen bg-black">

    <div class="w-auto h-auto bg-yellow-500 p-10 rounded-2xl">
        <h3 class="text-3xl font-bold text-center">Random Password Generator</h3>
        <br>
        <div class="bg-black w-full flex rounded-xl">
        <input type="text" class="bg-white w-[80%] h-[50px]">
        <button class="bg-blue-500 w-[20%]">CO</button>
        </div>
        <br>
        <h5>Set Password Length</h5>
        <div class="flex justify-between">
            <h4>Password Length</h4>
            <input type="number" class="bg-white">
        </div>
        <br>
        <h5>Customise Password</h5>
        <div class="flex-row">
            <div class="flex justify-between" >
                <h5>Symbols</h5>
                <input type="checkbox" name="" id="">
            </div>
                        <div class="flex justify-between" >
                <h5>Numbers</h5>
                <input type="checkbox" name="" id="">
            </div>
                        <div class="flex justify-between" >
                <h5>Lowercase</h5>
                <input type="checkbox" name="" id="">
            </div>
                        <div class="flex justify-between" >
                <h5>Uppercase</h5>
                <input type="checkbox" name="" id="">
            </div>
        </div>
        <br>
        <div class="flex justify-between gap-2">
            <button type="submit" class="bg-black text-white p-5 rounded-xl w-full">Generate</button>
            <button class="bg-black text-white p-5 rounded-xl w-full" >Copy</button>
        </div>
    </div>

</body>
</html>
