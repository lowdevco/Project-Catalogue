<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./assets/css/password.css" />
  </head>
  <body
    class="bg-gradient-to-br from-green-600 to-black min-h-screen flex items-center justify-center p-4"
  >
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
      <h1 class="text-3xl font-bold text-gray-800 mb-8 text-center">
        Random Password Generator
      </h1>

      <div class="space-y-6">
        <div class="bg-gray-50 rounded-lg p-4 border-2 border-gray-200">
          <div class="flex items-center justify-between gap-3">
            <input
              type="text"
              id="passwordDisplay"
              readonly
              class="flex-1 bg-transparent text-gray-800 font-mono text-lg outline-none"
              placeholder="Your password will appear here"
            />
            <button
              id="copyBtn"
              class="bg-green-600 hover:bg-green-900 text-white p-2 rounded-lg transition duration-200"
              title="Copy password"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
                class="size-6"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M8.25 7.5V6.108c0-1.135.845-2.098 1.976-2.192.373-.03.748-.057 1.123-.08M15.75 18H18a2.25 2.25 0 0 0 2.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 0 0-1.123-.08M15.75 18.75v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5A3.375 3.375 0 0 0 6.375 7.5H5.25m11.9-3.664A2.251 2.251 0 0 0 15 2.25h-1.5a2.251 2.251 0 0 0-2.15 1.586m5.8 0c.065.21.1.433.1.664v.75h-6V4.5c0-.231.035-.454.1-.664M6.75 7.5H4.875c-.621 0-1.125.504-1.125 1.125v12c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V16.5a9 9 0 0 0-9-9Z"
                />
              </svg>
            </button>
          </div>
        </div>

        <div>
          <div class="flex justify-between items-center mb-3">
            <label class="text-gray-700 font-semibold">Password Length</label>
            <span
              id="lengthValue"
              class="bg-green-600 text-white px-3 py-1 rounded-lg font-bold"
              >8</span
            >
          </div>
          <input
            type="range"
            id="lengthSlider"
            min="4"
            max="20"
            value="8"
            class="w-full h-2 bg-gray-300 rounded-lg appearance-none cursor-pointer accent-green-600"
          />
          <div class="flex justify-between text-xs text-gray-500 mt-2">
            <span>4</span>
            <span>20</span>
          </div>
        </div>

        <div class="space-y-3">
          <label class="text-gray-700 font-semibold block"
            >Character Types</label
          >

          <label
            class="flex items-center gap-3 cursor-pointer p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition"
          >
            <input
              type="checkbox"
              id="uppercase"
              checked
              class="w-5 h-5 rounded cursor-pointer checked:bg-blue-600"
            />
            <span class="text-gray-700 font-medium">Uppercase (A-Z)</span>
          </label>

          <label
            class="flex items-center gap-3 cursor-pointer p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition"
          >
            <input
              type="checkbox"
              id="lowercase"
              checked
              class="w-5 h-5 text-blue-600 rounded cursor-pointer"
            />
            <span class="text-gray-700 font-medium">Lowercase (a-z)</span>
          </label>

          <label
            class="flex items-center gap-3 cursor-pointer p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition"
          >
            <input
              type="checkbox"
              id="numbers"
              checked
              class="w-5 h-5 text-blue-600 rounded cursor-pointer"
            />
            <span class="text-gray-700 font-medium">Numbers (0-9)</span>
          </label>

          <label
            class="flex items-center gap-3 cursor-pointer p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition"
          >
            <input
              type="checkbox"
              id="symbols"
              class="w-5 h-5 text-blue-600 rounded cursor-pointer"
            />
            <span class="text-gray-700 font-medium">Symbols (!@#$%...)</span>
          </label>
        </div>

        <button
          id="generateBtn"
          class="w-full bg-green-600 hover:bg-green-800 text-white font-bold py-3 px-4 rounded-lg transition duration-200 flex items-center justify-center gap-2"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M9 8.25H7.5a2.25 2.25 0 0 0-2.25 2.25v9a2.25 2.25 0 0 0 2.25 2.25h9a2.25 2.25 0 0 0 2.25-2.25v-9a2.25 2.25 0 0 0-2.25-2.25H15m0-3-3-3m0 0-3 3m3-3V15"
            />
          </svg>

          Generate Password
        </button>
      </div>
    </div>

    <script src="./assets/js/password.js"></script>
  </body>
</html>
